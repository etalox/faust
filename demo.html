<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faust Partners™ - Test de Color</title>
    <style>
        :root {
            /* Fondo suave, evitando el negro puro (#000000) para eliminar la aberración cromática */
            --bg-dark: #121212;
            --text-light: #F3F4F6;

            /* Azul original vibrante para pantallas sRGB estándar */
            --cta-blue: #0000FF;
        }

        /* Corrección de color para pantallas Wide Gamut (P3 / OLED) */
        @media (color-gamut: p3) {
            :root {
                /* Inyección de verde para compensar el desvío hacia el morado en hardware moderno */
                --cta-blue: #0055FF; 
            }
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #1E1E1E;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: #A1A1AA;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .cta-button {
            background-color: var(--cta-blue);
            color: #FFFFFF;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Faust Partners™</h1>
        <p>Este botón utiliza la inyección de color P3. En pantallas estándar renderiza <strong>#0000FF</strong> puro. En pantallas modernas (P3/OLED), ajusta a <strong>#0033FF</strong> para mantener el azul intacto y evitar el tono morado.</p>
        <button class="cta-button">Maximizar Ingresos</button>
    </div>
</body>
</html>
