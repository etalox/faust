<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faust Partners™ - Test Dinámico de Color</title>
    <style>
        :root {
            --bg-dark: #09090A;
            --text-light: #F3F4F6;
            --cta-blue: #0000FF;
        }

        @media (color-gamut: p3) {
            :root {
                --cta-blue: oklch(55% 0.3 255);
            }
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #1E1E1E;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: #A1A1AA;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .cta-button {
            background-color: var(--cta-blue);
            color: #FFFFFF;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease;
            margin-bottom: 30px;
            width: 100%;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* --- SISTEMA DE DETECCIÓN VISUAL --- */
        .status-box {
            background-color: #2A2A2A;
            border: 1px solid #3F3F46;
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
            text-align: left;
        }

        .status-gamut::before {
            content: "Gamut detectado: Estándar (sRGB)";
            display: block;
            margin-bottom: 8px;
            color: #F87171; /* Rojo suave */
        }

        .status-color::before {
            content: "Renderizando: #0000FF";
            display: block;
            font-weight: bold;
            color: #60A5FA; /* Azul legible en fondo oscuro */
        }

        /* Actualización dinámica si el dispositivo soporta P3 */
        @media (color-gamut: p3) {
            .status-gamut::before {
                content: "Gamut detectado: Amplio (Display P3)";
                color: #34D399; /* Verde suave */
            }
            .status-color::before {
                content: "Renderizando: #0045FF";
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Faust Partners™</h1>
        <p>Abre este archivo en tu laptop y luego en tu celular. El panel inferior te confirmará qué espacio de color está detectando el navegador.</p>

        <button class="cta-button">Maximizar Ingresos</button>

        <div class="status-box">
            <div class="status-gamut"></div>
            <div class="status-color"></div>
        </div>
    </div>
</body>
</html>
