<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Faust Partners</title>
  <script>
    (function() {
      var CODE = 'es-LA';
      var LANG = 'Español';
      var COUNTRY = 'Latin America';
      var GT_CODE = 'es';

      if (window.localStorage) {
        localStorage.setItem('faust-lang-selection-code', CODE);
        localStorage.setItem('faust-lang-native', LANG);
        localStorage.setItem('faust-lang-country', COUNTRY);
        localStorage.removeItem('faust-detected-country-code');
      }

      var domain = window.location.hostname;
      
      function clearCookie() {
        document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + domain + ";";
        if (domain.includes('.')) {
          document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=." + domain + ";";
        }
      }

      clearCookie();
      var target = '../start/';
      if (window.location.protocol === 'file:') {
        target = '../start/index.html';
      }
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
